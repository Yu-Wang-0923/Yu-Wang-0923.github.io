<!DOCTYPE html>
<html lang="{{ site.Language.Locale }}" dir="{{ or site.Language.Direction `ltr` }}" class="h-full">
<head>
  {{ partial "head.html" . }}
</head>
<body class="flex flex-col bg-gray-50 font-bilingual">
  <header class="fixed top-0 left-0 z-30 w-full bg-white shadow-sm">
    <div class="w-full max-w-4xl mx-auto px-6 overflow-x-auto sm:overflow-visible">
      {{ partial "header.html" . }}
    </div>
  </header>
  
  <div class="flex-1 flex flex-col min-h-screen pt-24">
    <main class="flex-1 w-full max-w-4xl mx-auto px-8 sm:px-10 overflow-x-auto sm:overflow-visible">
      {{ block "main" . }}{{ end }}
    </main>
    {{ if not .IsHome }}
    <div class="w-full max-w-4xl mx-auto px-8 sm:px-10 pb-8 flex justify-center">
      <a href="{{ "/" | relLangURL }}" class="inline-flex items-center text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-300 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to Home
      </a>
    </div>
    {{ end }}
  </div>
  
  <footer class="w-full max-w-4xl mx-auto px-6 overflow-x-auto sm:overflow-visible">
    {{ partial "footer.html" . }}
  </footer>
</body>
</html>
