{{ define "main" }}
  <div class="max-w-3xl mx-auto min-h-[70vh] flex items-center justify-center px-4 relative">
    <!-- 背景装饰已移除 -->
    
    <div class="w-full text-center">
      {{ with .Site.Params.avatar }}
      <div class="mx-auto mb-8 w-40 md:w-52 aspect-square relative group">
        <!-- 头像 -->
        <div class="rounded-full overflow-hidden border-2 border-gray-100 shadow-sm hover:shadow-md transition-all duration-300 relative w-full h-full">
          <img src="{{ .url }}" alt="{{ $.Site.Title }}" class="w-full h-full object-cover transform transition-transform duration-500 group-hover:scale-105">
        </div>
      </div>
      {{ end }}
      <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-6">{{ .Site.Title }}</h1>
      <div class="prose prose-lg md:prose-xl mx-auto">
        {{ .Content }}
      </div>
    </div>
  </div>
{{ end }}
